name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            artifact_name: Rain-windows-x64
            build_command: .\build-windows.bat
          - name: linux-x64
            os: ubuntu-latest
            artifact_name: rain-linux-x64
            build_command: bash ./build-linux.sh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Build
        run: ${{ matrix.build_command }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: release/
          include-hidden-files: true
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare assets
        run: |
          mkdir -p dist
          cd artifacts/Rain-windows-x64
          zip ../../dist/Rain-windows-x64.zip Rain.exe .env
          cd ../rain-linux-x64
          chmod +x rain
          tar -czf ../../dist/rain-linux-x64.tar.gz rain .env

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" dist/* --generate-notes --verify-tag \
            || gh release upload "$TAG_NAME" dist/* --clobber
